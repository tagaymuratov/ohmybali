<a href="{{ link }}" 
class="block bg-white overflow-hidden rounded-xl transition-color duration-300 hover:shadow-lg hover:bg-primary">
  <div>
    <img src="{{ image }}" alt="" class="w-full h-48 object-cover">
    <div class="p-4">
      <p class="font-semibold text-xl mb-1">{{ title }}</p>
      <p class="mb-1 font-light">от {{ price }} USD</p>
      <p class="mb-1">{{ text }}</p>
      <!--<a href="{{ link }}" class="inline-block px-4 py-2 rounded-lg border-2">Узнать больше</a>-->
    </div>
  </div>
</a>
